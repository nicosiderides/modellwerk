<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modellwerk — Visor de Módulo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c8f060;
      --accent2: #60c8f0;
      --text: #e8e8e8;
      --muted: #555;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
      pointer-events: none;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .model-tag {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 2px;
    }

    /* ── CONTROLES ── */
    #controls-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 20px;
      transition: opacity 0.4s;
    }

    #controls-panel.hidden { opacity: 0; pointer-events: none; }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .ctrl-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .keys {
      display: flex;
      gap: 4px;
    }

    .key {
      background: var(--surface);
      border: 1px solid #333;
      border-bottom: 2px solid #444;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      min-width: 28px;
      text-align: center;
    }

    .divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }

    /* ── INFO LATERAL ── */
    #info-panel {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .info-item {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
    }

    .info-value {
      font-size: 13px;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }

    /* ── CROSSHAIR ── */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #crosshair.active { opacity: 1; }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(200,240,96,0.8);
    }

    #crosshair::before {
      width: 1px; height: 14px;
      top: -7px; left: 0;
    }

    #crosshair::after {
      width: 14px; height: 1px;
      top: 0; left: -7px;
    }

    /* ── OVERLAY DE INICIO ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(8px);
      transition: opacity 0.6s;
    }

    #start-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1;
    }

    .overlay-title span { color: var(--accent); }

    .overlay-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .start-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      padding: 14px 36px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,240,96,0.25);
    }

    .loading-bar-wrap {
      margin-top: 40px;
      width: 240px;
    }

    .loading-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .loading-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── MODO ÓRBITA ── */
    #mode-toggle {
      position: fixed;
      top: 16px;
      right: 24px;
      z-index: 10;
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .mode-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #paused-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #paused-msg.visible { opacity: 1; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- Crosshair -->
<div id="crosshair"></div>

<!-- Header -->
<div id="header">
  <div class="logo">Modell<span>werk</span></div>
  <div class="model-tag">Módulo 01 — Vista 3D</div>
</div>

<!-- Mode toggle -->
<div id="mode-toggle">
  <button class="mode-btn active" id="btn-fps" onclick="setMode('fps')">Primera Persona</button>
  <button class="mode-btn" id="btn-orbit" onclick="setMode('orbit')">Órbita</button>
</div>

<!-- Info panel -->
<div id="info-panel">
  <div class="info-item">Altura<br><span class="info-value" id="height-val">—</span></div>
</div>

<!-- Paused message -->
<div id="paused-msg">Clic para continuar</div>

<!-- Controls -->
<div id="controls-panel">
  <div class="ctrl-group">
    <div class="keys">
      <div class="key">W</div>
    </div>
    <div class="keys">
      <div class="key">A</div>
      <div class="key">S</div>
      <div class="key">D</div>
    </div>
    <div class="ctrl-label">Mover</div>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <div class="keys"><div class="key" style="font-size:9px">Mouse</div></div>
    <div class="ctrl-label">Mirar</div>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <div class="keys"><div class="key">↑</div><div class="key">↓</div></div>
    <div class="ctrl-label">Velocidad</div>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <div class="keys"><div class="key" style="font-size:9px">ESC</div></div>
    <div class="ctrl-label">Pausar</div>
  </div>
</div>

<!-- Start overlay -->
<div id="start-overlay">
  <div class="overlay-title">Módulo <span>01</span></div>
  <div class="overlay-sub">Modellwerk — Visor arquitectónico</div>

  <div class="loading-bar-wrap" id="loading-wrap">
    <div class="loading-label" id="loading-label">Cargando modelo...</div>
    <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
  </div>

  <button class="start-btn" id="start-btn" style="display:none" onclick="enterFPS()">
    Ingresar al módulo →
  </button>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  LOADER inline (GLTFLoader r128)
// ─────────────────────────────────────────────
// Minimal GLTFLoader compatible r128
const GLTFLoader = (function() {
  function GLTFLoader(manager) {
    THREE.Loader.call(this, manager);
  }
  GLTFLoader.prototype = Object.assign(Object.create(THREE.Loader.prototype), {
    constructor: GLTFLoader,
    load: function(url, onLoad, onProgress, onError) {
      const loader = new THREE.FileLoader(this.manager);
      loader.setPath(this.path);
      loader.setResponseType('arraybuffer');
      loader.setRequestHeader(this.requestHeader);
      loader.setWithCredentials(this.withCredentials);
      loader.load(url, buffer => {
        try { this.parse(buffer, '', onLoad, onError); }
        catch(e) { if(onError) onError(e); else console.error(e); }
      }, onProgress, onError);
    },
    parse: function(data, path, onLoad, onError) {
      // Use THREE's built-in GLTFLoader if available, else fallback
      const magic = new Uint8Array(data, 0, 4);
      // GLB magic: 0x46546C67
      if(magic[0]===0x67 && magic[1]===0x6C && magic[2]===0x54 && magic[3]===0x46) {
        this._parseBinary(data, path, onLoad, onError);
      }
    },
    _parseBinary: function(data, path, onLoad, onError) {
      const view = new DataView(data);
      const jsonLength = view.getUint32(12, true);
      const jsonText = new TextDecoder().decode(new Uint8Array(data, 20, jsonLength));
      const json = JSON.parse(jsonText);
      const binStart = 20 + jsonLength + 8;
      const binBuffer = data.slice(binStart);
      this._buildScene(json, binBuffer, onLoad, onError);
    },
    _buildScene: function(json, binBuffer, onLoad, onError) {
      const buffers = [binBuffer];
      const scene = new THREE.Group();
      const meshes = json.meshes || [];
      const accessors = json.accessors || [];
      const bufferViews = json.bufferViews || [];
      const nodes = json.nodes || [];

      function getBuffer(accessorIdx) {
        const acc = accessors[accessorIdx];
        const bv = bufferViews[acc.bufferView];
        const buf = buffers[bv.buffer || 0];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const compMap = {5120:1,5121:1,5122:2,5123:2,5125:4,5126:4};
        const typeMap = {SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT2:4,MAT3:9,MAT4:16};
        const compSize = compMap[acc.componentType];
        const numComp = typeMap[acc.type];
        const len = acc.count * numComp;
        const slice = buf.slice(offset, offset + len * compSize);
        if(acc.componentType === 5126) return new Float32Array(slice);
        if(acc.componentType === 5125) return new Uint32Array(slice);
        if(acc.componentType === 5123) return new Uint16Array(slice);
        return new Uint8Array(slice);
      }

      const defaultMat = new THREE.MeshStandardMaterial({
        color: 0xd4c9b8,
        roughness: 0.75,
        metalness: 0.05
      });

      meshes.forEach(mesh => {
        mesh.primitives.forEach(prim => {
          const geo = new THREE.BufferGeometry();
          if(prim.attributes.POSITION !== undefined) {
            geo.setAttribute('position', new THREE.BufferAttribute(getBuffer(prim.attributes.POSITION), 3));
          }
          if(prim.attributes.NORMAL !== undefined) {
            geo.setAttribute('normal', new THREE.BufferAttribute(getBuffer(prim.attributes.NORMAL), 3));
          }
          if(prim.indices !== undefined) {
            geo.setIndex(new THREE.BufferAttribute(getBuffer(prim.indices), 1));
          }
          if(!prim.attributes.NORMAL) geo.computeVertexNormals();
          const m = new THREE.Mesh(geo, defaultMat);
          scene.add(m);
        });
      });

      // Apply node transforms
      nodes.forEach(node => {
        if(node.translation) {
          // handled by mesh position directly since we flatten
        }
      });

      // Compute bounding box and center
      const box = new THREE.Box3().setFromObject(scene);
      const center = box.getCenter(new THREE.Vector3());
      scene.position.sub(center);

      onLoad({ scene, scenes: [scene], cameras: [], animations: [] });
    }
  });
  return GLTFLoader;
})();

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
scene.fog = new THREE.Fog(0x0a0a0a, 15, 40);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(5, 10, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 50;
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xc8e8ff, 0.4);
fill.position.set(-5, 3, -5);
scene.add(fill);

const hemi = new THREE.HemisphereLight(0xfff0d0, 0x404060, 0.3);
scene.add(hemi);

// Camera
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.7, 3);

// Floor
const floorGeo = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1, metalness: 0 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

// Grid
const grid = new THREE.GridHelper(60, 60, 0x1a1a1a, 0x1a1a1a);
grid.position.y = 0.001;
scene.add(grid);

// ─────────────────────────────────────────────
//  LOAD MODEL
// ─────────────────────────────────────────────
let modelLoaded = false;
let modelScene = null;

const loader = new GLTFLoader();
loader.load(
  'Modulo01.glb',
  gltf => {
    modelScene = gltf.scene;
    modelScene.traverse(child => {
      if(child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    // Scale and position
    const box = new THREE.Box3().setFromObject(modelScene);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 6 / maxDim;
    modelScene.scale.setScalar(scale);

    const box2 = new THREE.Box3().setFromObject(modelScene);
    const min = box2.min;
    modelScene.position.y = -min.y;

    scene.add(modelScene);
    modelLoaded = true;

    document.getElementById('loading-label').textContent = 'Modelo listo';
    document.getElementById('loading-fill').style.width = '100%';
    setTimeout(() => {
      document.getElementById('loading-wrap').style.display = 'none';
      document.getElementById('start-btn').style.display = 'block';
    }, 400);
  },
  xhr => {
    const pct = (xhr.loaded / xhr.total * 100).toFixed(0);
    document.getElementById('loading-fill').style.width = pct + '%';
    document.getElementById('loading-label').textContent = `Cargando... ${pct}%`;
  },
  err => {
    console.error(err);
    document.getElementById('loading-label').textContent = 'Error al cargar el modelo.';
  }
);

// ─────────────────────────────────────────────
//  PRIMERA PERSONA
// ─────────────────────────────────────────────
let mode = 'none'; // 'fps' | 'orbit'
let fpsActive = false;
const keys = {};
let yaw = 0, pitch = 0;
let moveSpeed = 0.04;
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const euler = new THREE.Euler(0, 0, 0, 'YXZ');

function enterFPS() {
  const overlay = document.getElementById('start-overlay');
  overlay.classList.add('fade-out');
  setTimeout(() => overlay.style.display = 'none', 600);
  setMode('fps');
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-fps').classList.toggle('active', m === 'fps');
  document.getElementById('btn-orbit').classList.toggle('active', m === 'orbit');

  if(m === 'fps') {
    document.getElementById('controls-panel').classList.remove('hidden');
    if(document.pointerLockElement !== document.body) {
      document.body.requestPointerLock();
    }
  } else {
    fpsActive = false;
    document.getElementById('crosshair').classList.remove('active');
    document.getElementById('controls-panel').classList.add('hidden');
    if(document.pointerLockElement) document.exitPointerLock();
  }
}

// Pointer lock
document.addEventListener('pointerlockchange', () => {
  fpsActive = document.pointerLockElement === document.body;
  document.getElementById('crosshair').classList.toggle('active', fpsActive);
  document.getElementById('paused-msg').classList.toggle('visible', mode === 'fps' && !fpsActive);
});

document.addEventListener('click', () => {
  if(mode === 'fps' && !fpsActive && document.getElementById('start-overlay').style.display === 'none') {
    document.body.requestPointerLock();
  }
});

document.addEventListener('mousemove', e => {
  if(!fpsActive) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
});

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code === 'Escape' && mode === 'fps') { /* pointer lock handles this */ }
  if(e.code === 'ArrowUp') moveSpeed = Math.min(moveSpeed + 0.01, 0.15);
  if(e.code === 'ArrowDown') moveSpeed = Math.max(moveSpeed - 0.01, 0.01);
});

document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─────────────────────────────────────────────
//  ORBIT (simple)
// ─────────────────────────────────────────────
let orbitTheta = 0, orbitPhi = Math.PI/4, orbitRadius = 10;
let orbitDragging = false, orbitLast = {x:0,y:0};

renderer.domElement.addEventListener('mousedown', e => {
  if(mode !== 'orbit') return;
  orbitDragging = true;
  orbitLast = {x:e.clientX, y:e.clientY};
});

renderer.domElement.addEventListener('mousemove', e => {
  if(!orbitDragging || mode !== 'orbit') return;
  const dx = e.clientX - orbitLast.x;
  const dy = e.clientY - orbitLast.y;
  orbitTheta -= dx * 0.005;
  orbitPhi = Math.max(0.1, Math.min(Math.PI/2, orbitPhi - dy * 0.005));
  orbitLast = {x:e.clientX, y:e.clientY};
});

renderer.domElement.addEventListener('mouseup', () => orbitDragging = false);

renderer.domElement.addEventListener('wheel', e => {
  if(mode !== 'orbit') return;
  orbitRadius = Math.max(2, Math.min(20, orbitRadius + e.deltaY * 0.01));
});

// ─────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  if(mode === 'fps') {
    if(fpsActive) {
      direction.set(0,0,0);
      if(keys['KeyW'] || keys['ArrowUp_unused']) direction.z -= 1;
      if(keys['KeyS']) direction.z += 1;
      if(keys['KeyA']) direction.x -= 1;
      if(keys['KeyD']) direction.x += 1;
      direction.normalize();

      const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

      camera.position.addScaledVector(forward, direction.z * -moveSpeed);
      camera.position.addScaledVector(right, direction.x * moveSpeed);
    }
    camera.position.y = 1.7; // altura fija
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    // height display
    document.getElementById('height-val').textContent = '1.70 m';

  } else if(mode === 'orbit') {
    const x = orbitRadius * Math.sin(orbitPhi) * Math.sin(orbitTheta);
    const y = orbitRadius * Math.cos(orbitPhi);
    const z = orbitRadius * Math.sin(orbitPhi) * Math.cos(orbitTheta);
    camera.position.set(x, y, z);
    camera.lookAt(0, 1.5, 0);
  }

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
